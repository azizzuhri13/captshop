<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .neo-border { border: 3px solid #000; }
        .neo-shadow { box-shadow: 4px 4px 0px 0px #000; }
        .neo-btn:hover { transform: translate(2px, 2px); box-shadow: 0px 0px 0px 0px #000; }
        .neo-btn { border: 2px solid #000; box-shadow: 2px 2px 0px 0px #000; transition: all 0.1s ease; }
    </style>
</head>
<body class="text-black p-6">

    <!-- Container Login -->
    <div id="login-container" class="max-w-md mx-auto mt-20 bg-white neo-border neo-shadow rounded-2xl p-8">
        <h2 class="text-2xl font-extrabold mb-6 text-center">Login Admin</h2>
        <input type="password" id="pin-input" placeholder="Masukkan PIN Rahasia" class="w-full neo-border rounded-xl py-3 px-4 mb-4 focus:outline-none">
        <button onclick="login()" class="w-full neo-btn bg-yellow-300 rounded-xl py-3 font-bold text-lg">Masuk</button>
        <p id="login-msg" class="text-red-500 font-bold text-center mt-3 hidden"></p>
    </div>

    <!-- Container Dashboard Utama (Awalnya Disembunyikan) -->
    <div id="dashboard-container" class="max-w-6xl mx-auto hidden">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-extrabold bg-white neo-border px-4 py-2 inline-block shadow-[4px_4px_0px_0px_#f472b6]">Panel Admin Captshop</h2>
            <button onclick="openModal()" class="neo-btn bg-green-400 rounded-xl px-6 py-2 font-bold">+ Tambah Produk</button>
        </div>

        <div class="bg-white neo-border neo-shadow rounded-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-100 border-b-4 border-black">
                        <tr>
                            <th class="p-4 font-bold border-r-2 border-black">Nama</th>
                            <th class="p-4 font-bold border-r-2 border-black">Kategori</th>
                            <th class="p-4 font-bold border-r-2 border-black text-center">Ikon</th>
                            <th class="p-4 font-bold border-r-2 border-black">Durasi</th>
                            <th class="p-4 font-bold border-r-2 border-black">Harga</th>
                            <th class="p-4 font-bold border-r-2 border-black">Status</th>
                            <th class="p-4 font-bold text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="7" class="p-8 text-center font-bold">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Form Tambah/Edit -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white neo-border neo-shadow rounded-2xl w-full max-w-md max-h-[90vh] overflow-y-auto">
            <div class="p-4 border-b-2 border-black flex justify-between items-center bg-yellow-300 sticky top-0">
                <h3 id="modal-title" class="font-bold text-lg">Tambah Produk Baru</h3>
                <button onclick="closeModal()" class="neo-btn bg-white w-8 h-8 rounded-full font-bold">X</button>
            </div>
            
            <div class="p-6 flex flex-col gap-4">
                <input type="hidden" id="form-id">
                <div>
                    <label class="font-bold text-sm mb-1 block">Nama Produk</label>
                    <input type="text" id="form-nama" class="w-full neo-border rounded-lg py-2 px-3">
                </div>
                <div>
                    <label class="font-bold text-sm mb-1 block">Kategori</label>
                    <input type="text" id="form-kategori" class="w-full neo-border rounded-lg py-2 px-3">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="font-bold text-sm mb-1 block">Ikon (Emoji)</label>
                        <input type="text" id="form-ikon" class="w-full neo-border rounded-lg py-2 px-3">
                    </div>
                    <div>
                        <label class="font-bold text-sm mb-1 block">Warna Ikon</label>
                        <input type="text" id="form-warna" class="w-full neo-border rounded-lg py-2 px-3">
                    </div>
                </div>
                <div>
                    <label class="font-bold text-sm mb-1 block">Paket / Durasi</label>
                    <input type="text" id="form-durasi" class="w-full neo-border rounded-lg py-2 px-3">
                </div>
                <div>
                    <label class="font-bold text-sm mb-1 block">Harga</label>
                    <input type="text" id="form-harga" class="w-full neo-border rounded-lg py-2 px-3">
                </div>
                <div>
                    <label class="font-bold text-sm mb-1 block">Status</label>
                    <select id="form-status" class="w-full neo-border rounded-lg py-2 px-3">
                        <option value="Ada">Ada</option>
                        <option value="Kosong">Kosong</option>
                    </select>
                </div>
                <button id="btn-simpan" onclick="saveData()" class="w-full neo-btn bg-black text-white rounded-xl py-3 mt-2 font-bold">Simpan Data</button>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI SUPABASE ---
        const SUPABASE_URL = 'https://rymfgpivinapkeqkxuqf.supabase.co/rest/v1/products';
        const SUPABASE_KEY = 'sb_publishable_P2m6JpWkZEceFmop-HvqQw_1_CY9UWG'; 
        const ADMIN_PIN = '717717'; 

        let productsData = [];

        function showMsg(id, text) {
            const el = document.getElementById(id);
            el.innerText = text; el.classList.remove('hidden');
        }

        function getHeaders() {
            return { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' };
        }

        async function login() {
            const pin = document.getElementById('pin-input').value;
            if (pin !== ADMIN_PIN) {
                showMsg('login-msg', 'PIN Salah!'); return;
            }
            
            showMsg('login-msg', 'Mengecek...');
            try {
                await reloadData();
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('dashboard-container').classList.remove('hidden');
            } catch (err) {
                showMsg('login-msg', 'Gagal memuat database.');
            }
        }

        async function reloadData() {
            const response = await fetch(SUPABASE_URL + '?select=*&order=id.asc', { headers: getHeaders() });
            productsData = await response.json();
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            if(productsData.length === 0) { tbody.innerHTML = '<tr><td colspan="7" class="p-4 text-center">Belum ada data</td></tr>'; return; }

            productsData.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.className = "border-b-2 border-gray-200 hover:bg-gray-50";
                tr.innerHTML = `
                    <td class="p-4 border-r-2 border-black font-semibold">${row.nama}</td>
                    <td class="p-4 border-r-2 border-black text-sm">${row.kategori}</td>
                    <td class="p-4 border-r-2 border-black text-center text-2xl">${row.ikon}</td>
                    <td class="p-4 border-r-2 border-black font-medium">${row.durasi}</td>
                    <td class="p-4 border-r-2 border-black font-bold">${row.harga}</td>
                    <td class="p-4 border-r-2 border-black"><span class="px-2 py-1 text-xs font-bold neo-border rounded ${row.status.toLowerCase() === 'ada' ? 'bg-green-300' : 'bg-red-300'}">${row.status}</span></td>
                    <td class="p-4 text-center space-x-2">
                        <button onclick="editRow(${index})" class="neo-btn bg-blue-300 px-3 py-1 rounded text-sm font-bold">Edit</button>
                        <button onclick="deleteRow(${row.id})" class="neo-btn bg-red-400 px-3 py-1 rounded text-sm font-bold text-white">X</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openModal(index = null) {
            document.getElementById('modal-overlay').classList.remove('hidden');
            if (index !== null) {
                const row = productsData[index];
                document.getElementById('modal-title').innerText = "Edit Produk";
                document.getElementById('form-id').value = row.id;
                document.getElementById('form-nama').value = row.nama;
                document.getElementById('form-kategori').value = row.kategori;
                document.getElementById('form-ikon').value = row.ikon;
                document.getElementById('form-warna').value = row.warna;
                document.getElementById('form-durasi').value = row.durasi;
                document.getElementById('form-harga').value = row.harga;
                document.getElementById('form-status').value = row.status;
            } else {
                document.getElementById('modal-title').innerText = "Tambah Produk Baru";
                document.getElementById('form-id').value = "";
                document.getElementById('form-nama').value = "";
                document.getElementById('form-kategori').value = "";
                document.getElementById('form-ikon').value = "";
                document.getElementById('form-warna').value = "text-blue-500";
                document.getElementById('form-durasi').value = "";
                document.getElementById('form-harga').value = "";
                document.getElementById('form-status').value = "Ada";
            }
        }

        function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }

        async function saveData() {
            const btn = document.getElementById('btn-simpan');
            btn.innerText = "Menyimpan..."; btn.disabled = true;

            const id = document.getElementById('form-id').value;
            const payload = {
                nama: document.getElementById('form-nama').value,
                kategori: document.getElementById('form-kategori').value,
                ikon: document.getElementById('form-ikon').value,
                warna: document.getElementById('form-warna').value,
                durasi: document.getElementById('form-durasi').value,
                harga: document.getElementById('form-harga').value,
                status: document.getElementById('form-status').value
            };

            try {
                if (id) {
                    await fetch(`${SUPABASE_URL}?id=eq.${id}`, { method: 'PATCH', headers: getHeaders(), body: JSON.stringify(payload) });
                } else {
                    await fetch(SUPABASE_URL, { method: 'POST', headers: getHeaders(), body: JSON.stringify(payload) });
                }
                closeModal();
                await reloadData();
            } catch (err) { alert("Terjadi kesalahan"); }
            
            btn.innerText = "Simpan Data"; btn.disabled = false;
        }

        function editRow(index) { openModal(index); }

        async function deleteRow(id) {
            if(confirm("Yakin ingin menghapus produk ini?")) {
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '<tr><td colspan="7" class="p-4 text-center font-bold text-red-500">Menghapus...</td></tr>';
                await fetch(`${SUPABASE_URL}?id=eq.${id}`, { method: 'DELETE', headers: getHeaders() });
                await reloadData();
            }
        }
    </script>
</body>
</html>
