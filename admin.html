<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Captshop.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .neo-border { border: 3px solid #000; }
        .neo-shadow { box-shadow: 4px 4px 0px 0px #000; }
        .neo-btn:hover { transform: translate(2px, 2px); box-shadow: 0px 0px 0px 0px #000; }
        .neo-btn { border: 2px solid #000; box-shadow: 2px 2px 0px 0px #000; transition: all 0.1s ease; }
    </style>
</head>
<body class="text-black p-6">

    <!-- Container Login -->
    <div id="login-container" class="max-w-md mx-auto mt-20 bg-white neo-border neo-shadow rounded-2xl p-8">
        <h2 class="text-2xl font-extrabold mb-6 text-center">Login Admin</h2>
        
        <label class="font-bold text-sm mb-1 block">Email Admin</label>
        <input type="email" id="email-input" placeholder="admin@captshop.id" class="w-full neo-border rounded-xl py-3 px-4 mb-4 focus:outline-none">
        
        <label class="font-bold text-sm mb-1 block">Password</label>
        <input type="password" id="password-input" placeholder="Masukkan Password" class="w-full neo-border rounded-xl py-3 px-4 mb-6 focus:outline-none">
        
        <button onclick="login()" class="w-full neo-btn bg-yellow-300 rounded-xl py-3 font-bold text-lg">Masuk</button>
        <p id="login-msg" class="text-red-500 font-bold text-center mt-3 hidden"></p>
    </div>

    <!-- Container Dashboard Utama (Awalnya Disembunyikan) -->
    <div id="dashboard-container" class="max-w-6xl mx-auto hidden">
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-3xl font-extrabold bg-white neo-border px-4 py-2 inline-block shadow-[4px_4px_0px_0px_#f472b6]">Panel Admin Captshop</h2>
            <div class="space-x-3">
                <button onclick="logout()" class="neo-btn bg-gray-200 rounded-xl px-4 py-2 font-bold text-sm">Logout</button>
                <button onclick="openModal()" class="neo-btn bg-green-400 rounded-xl px-6 py-2 font-bold">+ Tambah Produk</button>
            </div>
        </div>

        <div class="bg-white neo-border neo-shadow rounded-2xl overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-100 border-b-4 border-black">
                        <tr>
                            <th class="p-4 font-bold border-r-2 border-black">Nama</th>
                            <th class="p-4 font-bold border-r-2 border-black">Kategori</th>
                            <th class="p-4 font-bold border-r-2 border-black text-center">Ikon</th>
                            <th class="p-4 font-bold border-r-2 border-black">Durasi</th>
                            <th class="p-4 font-bold border-r-2 border-black">Harga</th>
                            <th class="p-4 font-bold border-r-2 border-black">Status</th>
                            <th class="p-4 font-bold text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="7" class="p-8 text-center font-bold">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Form Tambah/Edit -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white neo-border neo-shadow rounded-2xl w-full max-w-md max-h-[90vh] overflow-y-auto">
            <div class="p-4 border-b-2 border-black flex justify-between items-center bg-yellow-300 sticky top-0">
                <h3 id="modal-title" class="font-bold text-lg">Tambah Produk Baru</h3>
                <button onclick="closeModal()" class="neo-btn bg-white w-8 h-8 rounded-full font-bold">X</button>
            </div>
            
            <div class="p-6 flex flex-col gap-4">
                <input type="hidden" id="form-id">
                <input type="hidden" id="form-ikon-existing"> <!-- Menyimpan URL lama jika tidak ganti gambar -->

                <div>
                    <label class="font-bold text-sm mb-1 block">Nama Produk</label>
                    <input type="text" id="form-nama" class="w-full neo-border rounded-lg py-2 px-3">
                </div>
                <div>
                    <label class="font-bold text-sm mb-1 block">Kategori</label>
                    <select id="form-kategori" class="w-full neo-border rounded-lg py-2 px-3">
                        <option value="Cloud">Cloud</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Education">Education</option>
                        <option value="Productivity">Productivity</option>
                    </select>
                </div>
                <div>
                    <label class="font-bold text-sm mb-1 block">Gambar Ikon (Upload)</label>
                    <input type="file" id="form-ikon-file" accept="image/*" class="w-full neo-border rounded-lg py-2 px-3 bg-white">
                    <img id="ikon-preview" class="mt-3 h-16 w-16 object-contain rounded-lg neo-border hidden" alt="Preview Ikon">
                </div>
                <div>
                    <label class="font-bold text-sm mb-1 block">Paket / Durasi</label>
                    <input type="text" id="form-durasi" class="w-full neo-border rounded-lg py-2 px-3">
                </div>
                <div>
                    <label class="font-bold text-sm mb-1 block">Harga</label>
                    <input type="text" id="form-harga" class="w-full neo-border rounded-lg py-2 px-3">
                </div>
                <div>
                    <label class="font-bold text-sm mb-1 block">Status</label>
                    <select id="form-status" class="w-full neo-border rounded-lg py-2 px-3">
                        <option value="Ada">Ada</option>
                        <option value="Kosong">Kosong</option>
                    </select>
                </div>
                <button id="btn-simpan" onclick="saveData()" class="w-full neo-btn bg-black text-white rounded-xl py-3 mt-2 font-bold">Simpan Data</button>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI SUPABASE ---
        // PENTING: Ganti dengan Publishable Key Anda!
        const SUPABASE_KEY = 'sb_publishable_P2m6JpWkZEceFmop-HvqQw_1_CY9UWG'; 
        
        // URL Database & Auth
        const PROJECT_URL = 'https://rymfgpivinapkeqkxuqf.supabase.co';
        const SUPABASE_URL = `${PROJECT_URL}/rest/v1/products`;
        const SUPABASE_AUTH_URL = `${PROJECT_URL}/auth/v1/token?grant_type=password`;
        
        // URL Storage
        const STORAGE_BUCKET = 'icons';
        const SUPABASE_STORAGE_API = `${PROJECT_URL}/storage/v1/object/${STORAGE_BUCKET}`;
        const SUPABASE_STORAGE_PUBLIC = `${PROJECT_URL}/storage/v1/object/public/${STORAGE_BUCKET}`;

        let productsData = [];
        let sessionToken = ''; // Menyimpan token login

        function showMsg(id, text) {
            const el = document.getElementById(id);
            el.innerText = text; el.classList.remove('hidden');
        }

        function getHeaders() {
            return { 
                'apikey': SUPABASE_KEY, 
                'Authorization': 'Bearer ' + (sessionToken ? sessionToken : SUPABASE_KEY), 
                'Content-Type': 'application/json', 
                'Prefer': 'return=minimal' 
            };
        }

        // --- SISTEM LOGIN ---
        async function login() {
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;

            if (!email || !password) {
                showMsg('login-msg', 'Email dan Password wajib diisi!');
                return;
            }
            
            showMsg('login-msg', 'Memverifikasi...');
            
            try {
                const authResponse = await fetch(SUPABASE_AUTH_URL, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });

                const authData = await authResponse.json();

                if (!authResponse.ok) {
                    showMsg('login-msg', 'Email atau Password salah!');
                    return;
                }

                sessionToken = authData.access_token;
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('dashboard-container').classList.remove('hidden');
                await reloadData();

            } catch (err) {
                showMsg('login-msg', 'Gagal terhubung ke server.');
            }
        }

        function logout() {
            sessionToken = ''; 
            document.getElementById('email-input').value = '';
            document.getElementById('password-input').value = '';
            document.getElementById('login-msg').classList.add('hidden');
            document.getElementById('dashboard-container').classList.add('hidden');
            document.getElementById('login-container').classList.remove('hidden');
        }

        // --- MANAJEMEN DATA PRODUK ---
        async function reloadData() {
            const response = await fetch(SUPABASE_URL + '?select=*&order=id.asc', { headers: getHeaders() });
            productsData = await response.json();
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            if(productsData.length === 0) { tbody.innerHTML = '<tr><td colspan="7" class="p-4 text-center">Belum ada data</td></tr>'; return; }

            productsData.forEach((row, index) => {
                const tr = document.createElement('tr');
                tr.className = "border-b-2 border-gray-200 hover:bg-gray-50";
                
                // Cek apakah ikon adalah URL gambar (HTTP)
                const isImage = row.ikon && row.ikon.startsWith('http');
                const ikonDisplay = isImage 
                    ? `<img src="${row.ikon}" alt="ikon" class="w-8 h-8 object-contain mx-auto rounded">`
                    : `<span class="text-2xl">${row.ikon || '-'}</span>`;

                tr.innerHTML = `
                    <td class="p-4 border-r-2 border-black font-semibold">${row.nama}</td>
                    <td class="p-4 border-r-2 border-black text-sm">${row.kategori}</td>
                    <td class="p-4 border-r-2 border-black text-center">${ikonDisplay}</td>
                    <td class="p-4 border-r-2 border-black font-medium">${row.durasi}</td>
                    <td class="p-4 border-r-2 border-black font-bold">${row.harga}</td>
                    <td class="p-4 border-r-2 border-black"><span class="px-2 py-1 text-xs font-bold neo-border rounded ${row.status.toLowerCase() === 'ada' ? 'bg-green-300' : 'bg-red-300'}">${row.status}</span></td>
                    <td class="p-4 text-center space-x-2">
                        <button onclick="editRow(${index})" class="neo-btn bg-blue-300 px-3 py-1 rounded text-sm font-bold">Edit</button>
                        <button onclick="deleteRow(${row.id})" class="neo-btn bg-red-400 px-3 py-1 rounded text-sm font-bold text-white">X</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function openModal(index = null) {
            document.getElementById('modal-overlay').classList.remove('hidden');
            const preview = document.getElementById('ikon-preview');
            const fileInput = document.getElementById('form-ikon-file');
            fileInput.value = ''; // Reset input file

            if (index !== null) {
                const row = productsData[index];
                document.getElementById('modal-title').innerText = "Edit Produk";
                document.getElementById('form-id').value = row.id;
                document.getElementById('form-nama').value = row.nama;
                
                // Set Dropdown Kategori (Jika value tidak cocok dengan opsi manapun, akan otomatis memilih opsi pertama/kosong tergantung browser)
                const dropdownKategori = document.getElementById('form-kategori');
                dropdownKategori.value = row.kategori;
                // Fallback sederhana jika di database tersimpan kategori yang sudah tidak ada di list
                if(dropdownKategori.value === "") dropdownKategori.value = "Entertainment";

                document.getElementById('form-ikon-existing').value = row.ikon || '';
                document.getElementById('form-durasi').value = row.durasi;
                document.getElementById('form-harga').value = row.harga;
                document.getElementById('form-status').value = row.status;

                // Tampilkan preview gambar jika ada (HTTP URL)
                if (row.ikon && row.ikon.startsWith('http')) {
                    preview.src = row.ikon;
                    preview.classList.remove('hidden');
                } else {
                    preview.src = '';
                    preview.classList.add('hidden');
                }
            } else {
                document.getElementById('modal-title').innerText = "Tambah Produk Baru";
                document.getElementById('form-id').value = "";
                document.getElementById('form-nama').value = "";
                document.getElementById('form-kategori').value = "Entertainment"; // Default pilihan
                document.getElementById('form-ikon-existing').value = "";
                document.getElementById('form-durasi').value = "";
                document.getElementById('form-harga').value = "";
                document.getElementById('form-status').value = "Ada";
                preview.src = '';
                preview.classList.add('hidden');
            }
        }

        function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }

        // Tampilkan Preview Lokal saat file dipilih
        document.getElementById('form-ikon-file').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const preview = document.getElementById('ikon-preview');
                preview.src = URL.createObjectURL(file);
                preview.classList.remove('hidden');
            }
        });

        async function saveData() {
            const btn = document.getElementById('btn-simpan');
            btn.innerText = "Mengunggah & Menyimpan... Mohon tunggu."; 
            btn.disabled = true;

            const id = document.getElementById('form-id').value;
            let finalIkonValue = document.getElementById('form-ikon-existing').value;
            const fileInput = document.getElementById('form-ikon-file');

            try {
                // 1. UPLOAD GAMBAR KE SUPABASE STORAGE (Hanya jika ada file baru)
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    // Buat nama file unik (timestamp + random string)
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;

                    // Lakukan request upload ke Storage API
                    const uploadResponse = await fetch(`${SUPABASE_STORAGE_API}/${fileName}`, {
                        method: 'POST',
                        headers: {
                            'Authorization': 'Bearer ' + sessionToken, // Wajib pakai token user yang login
                            'apikey': SUPABASE_KEY,
                            'Content-Type': file.type
                        },
                        body: file
                    });

                    if (!uploadResponse.ok) {
                        const errDetails = await uploadResponse.json();
                        throw new Error('Gagal unggah gambar: ' + (errDetails.message || 'Cek Policy Storage Supabase Anda'));
                    }

                    // Susun URL Publik untuk disimpan di database
                    finalIkonValue = `${SUPABASE_STORAGE_PUBLIC}/${fileName}`;
                }

                // 2. Susun Payload Database
                const payload = {
                    nama: document.getElementById('form-nama').value,
                    kategori: document.getElementById('form-kategori').value,
                    ikon: finalIkonValue, // Simpan URL Gambar (Atau URL Lama / Emoji Lama jika tidak ganti gambar)
                    warna: 'text-black', // Default warna statis
                    durasi: document.getElementById('form-durasi').value,
                    harga: document.getElementById('form-harga').value,
                    status: document.getElementById('form-status').value
                };

                // 3. Simpan ke Database (Insert atau Update)
                if (id) {
                    await fetch(`${SUPABASE_URL}?id=eq.${id}`, { method: 'PATCH', headers: getHeaders(), body: JSON.stringify(payload) });
                } else {
                    await fetch(SUPABASE_URL, { method: 'POST', headers: getHeaders(), body: JSON.stringify(payload) });
                }

                closeModal();
                await reloadData();
            } catch (err) { 
                alert("Terjadi kesalahan: " + err.message); 
                console.error(err);
            }
            
            btn.innerText = "Simpan Data"; btn.disabled = false;
        }

        function editRow(index) { openModal(index); }

        async function deleteRow(id) {
            if(confirm("Yakin ingin menghapus produk ini?")) {
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '<tr><td colspan="7" class="p-4 text-center font-bold text-red-500">Menghapus...</td></tr>';
                await fetch(`${SUPABASE_URL}?id=eq.${id}`, { method: 'DELETE', headers: getHeaders() });
                await reloadData();
            }
        }
    </script>
</body>
</html>
