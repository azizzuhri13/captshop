<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Captshop.id</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f1f5f9; }
        .neo-border { border: 3px solid #000; }
        .neo-shadow { box-shadow: 4px 4px 0px 0px #000; }
        .neo-btn:hover { transform: translate(2px, 2px); box-shadow: 0px 0px 0px 0px #000; }
        .neo-btn { border: 2px solid #000; box-shadow: 2px 2px 0px 0px #000; transition: all 0.1s ease; }
        /* Custom scrollbar untuk tabel */
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-top: 1px solid black; }
        ::-webkit-scrollbar-thumb { background: #000; border-radius: 4px; }
    </style>
</head>
<body class="text-black p-4 md:p-6">

    <!-- Container Login -->
    <div id="login-container" class="max-w-md mx-auto mt-10 md:mt-20 bg-white neo-border neo-shadow rounded-2xl p-6 md:p-8">
        <h2 class="text-xl md:text-2xl font-extrabold mb-6 text-center">Login Admin</h2>
        
        <label class="font-bold text-xs md:text-sm mb-1 block">Email Admin</label>
        <input type="email" id="email-input" placeholder="admin@captshop.id" class="w-full text-sm md:text-base neo-border rounded-xl py-2 md:py-3 px-4 mb-4 focus:outline-none focus:ring-2 focus:ring-yellow-300">
        
        <label class="font-bold text-xs md:text-sm mb-1 block">Password</label>
        <input type="password" id="password-input" placeholder="Masukkan Password" class="w-full text-sm md:text-base neo-border rounded-xl py-2 md:py-3 px-4 mb-6 focus:outline-none focus:ring-2 focus:ring-yellow-300">
        
        <button onclick="login()" class="w-full neo-btn bg-yellow-300 rounded-xl py-2 md:py-3 font-bold text-base md:text-lg">Masuk</button>
        <p id="login-msg" class="text-red-500 font-bold text-center mt-3 hidden text-sm"></p>
    </div>

    <!-- Container Dashboard Utama (Awalnya Disembunyikan) -->
    <div id="dashboard-container" class="max-w-6xl mx-auto hidden">
        
        <!-- Header Dashboard -->
        <div class="flex flex-col md:flex-row justify-between items-center gap-4 md:gap-0 mb-6 md:mb-8">
            <h2 class="text-xl md:text-3xl font-extrabold bg-white neo-border px-4 py-2 inline-block shadow-[4px_4px_0px_0px_#f472b6] text-center w-full md:w-auto">Panel Admin</h2>
            <div class="flex gap-2 w-full md:w-auto justify-between md:justify-end">
                <button onclick="logout()" class="neo-btn bg-gray-200 rounded-xl px-4 py-2 font-bold text-xs md:text-sm flex-1 md:flex-none">Logout</button>
                <button onclick="openModal()" class="neo-btn bg-green-400 rounded-xl px-4 py-2 font-bold text-xs md:text-sm flex-1 md:flex-none whitespace-nowrap">+ Tambah Produk</button>
            </div>
        </div>

        <div class="bg-white neo-border neo-shadow rounded-2xl overflow-hidden w-full">
            <div class="overflow-x-auto w-full">
                <!-- Struktur tabel diperbarui: Kolom Varian disatukan -->
                <table class="w-full text-left border-collapse min-w-[700px]">
                    <thead class="bg-gray-100 border-b-4 border-black">
                        <tr>
                            <th class="p-3 md:p-4 font-bold border-r-2 border-black whitespace-nowrap">Nama</th>
                            <th class="p-3 md:p-4 font-bold border-r-2 border-black whitespace-nowrap">Kategori</th>
                            <th class="p-3 md:p-4 font-bold border-r-2 border-black text-center whitespace-nowrap">Ikon</th>
                            <th class="p-3 md:p-4 font-bold border-r-2 border-black min-w-[200px]">Varian (Paket)</th>
                            <th class="p-3 md:p-4 font-bold text-center whitespace-nowrap">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                        <tr><td colspan="5" class="p-8 text-center font-bold">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Form Tambah/Edit -->
    <div id="modal-overlay" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-3 backdrop-blur-sm">
        <div class="bg-white neo-border neo-shadow rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">
            <div class="p-3 md:p-4 border-b-2 border-black flex justify-between items-center bg-yellow-300 sticky top-0 z-10">
                <h3 id="modal-title" class="font-bold text-base md:text-lg">Tambah Produk Baru</h3>
                <button onclick="closeModal()" class="neo-btn bg-white w-7 h-7 md:w-8 md:h-8 rounded-full flex items-center justify-center font-bold">X</button>
            </div>
            
            <div class="p-4 md:p-6 flex flex-col gap-3 md:gap-4">
                <!-- Menyimpan nama lama untuk patokan Update/Delete -->
                <input type="hidden" id="form-old-nama">
                <input type="hidden" id="form-ikon-existing"> 

                <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                    <div>
                        <label class="font-bold text-xs md:text-sm mb-1 block">Nama Produk</label>
                        <input type="text" id="form-nama" class="w-full text-sm md:text-base neo-border rounded-lg py-2 px-3">
                    </div>
                    <div>
                        <label class="font-bold text-xs md:text-sm mb-1 block">Kategori</label>
                        <select id="form-kategori" class="w-full text-sm md:text-base neo-border rounded-lg py-2 px-3">
                            <option value="Cloud">Cloud</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Education">Education</option>
                            <option value="Productivity">Productivity</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="font-bold text-xs md:text-sm mb-1 block">Gambar Ikon (Upload)</label>
                    <input type="file" id="form-ikon-file" accept="image/*" class="w-full text-xs md:text-sm neo-border rounded-lg py-1.5 px-2 bg-white">
                    <img id="ikon-preview" class="mt-2 md:mt-3 h-12 w-12 md:h-16 md:w-16 object-contain rounded-lg neo-border hidden" alt="Preview Ikon">
                </div>
                
                <!-- Area Multi-Varian yang dinamis -->
                <div class="bg-gray-100 neo-border rounded-xl p-3 md:p-4 mt-2">
                    <label class="font-bold text-sm md:text-base mb-3 block border-b-2 border-black pb-2">📦 Varian Paket</label>
                    <div id="variants-container" class="flex flex-col gap-3 mb-4">
                        <!-- Varian akan muncul di sini via JavaScript -->
                    </div>
                    <button type="button" onclick="addVariantField()" class="w-full neo-btn bg-white text-xs md:text-sm font-bold py-2 rounded-lg border-dashed">+ Tambah Varian Lain</button>
                </div>

                <button id="btn-simpan" onclick="saveData()" class="w-full neo-btn bg-black text-white rounded-xl py-3 mt-2 font-bold text-sm md:text-base">Simpan Seluruh Data</button>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI SUPABASE ---
        // PENTING: Ganti dengan Publishable Key Anda!
        const SUPABASE_KEY = 'sb_publishable_P2m6JpWkZEceFmop-HvqQw_1_CY9UWG'; 
        
        // URL Database & Auth
        const PROJECT_URL = 'https://rymfgpivinapkeqkxuqf.supabase.co';
        const SUPABASE_URL = `${PROJECT_URL}/rest/v1/products`;
        const SUPABASE_AUTH_URL = `${PROJECT_URL}/auth/v1/token?grant_type=password`;
        
        // URL Storage
        const STORAGE_BUCKET = 'icons';
        const SUPABASE_STORAGE_API = `${PROJECT_URL}/storage/v1/object/${STORAGE_BUCKET}`;
        const SUPABASE_STORAGE_PUBLIC = `${PROJECT_URL}/storage/v1/object/public/${STORAGE_BUCKET}`;

        let productsData = [];
        let sessionToken = ''; 

        function showMsg(id, text) {
            const el = document.getElementById(id);
            el.innerText = text; el.classList.remove('hidden');
        }

        function getHeaders() {
            return { 
                'apikey': SUPABASE_KEY, 
                'Authorization': 'Bearer ' + (sessionToken ? sessionToken : SUPABASE_KEY), 
                'Content-Type': 'application/json', 
                'Prefer': 'return=minimal' 
            };
        }

        // --- SISTEM LOGIN ---
        async function login() {
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;

            if (!email || !password) {
                showMsg('login-msg', 'Email dan Password wajib diisi!');
                return;
            }
            showMsg('login-msg', 'Memverifikasi...');
            try {
                const authResponse = await fetch(SUPABASE_AUTH_URL, {
                    method: 'POST',
                    headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });

                const authData = await authResponse.json();

                if (!authResponse.ok) {
                    showMsg('login-msg', 'Email atau Password salah!');
                    return;
                }

                sessionToken = authData.access_token;
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('dashboard-container').classList.remove('hidden');
                await reloadData();

            } catch (err) {
                showMsg('login-msg', 'Gagal terhubung ke server.');
            }
        }

        function logout() {
            sessionToken = ''; 
            document.getElementById('email-input').value = '';
            document.getElementById('password-input').value = '';
            document.getElementById('login-msg').classList.add('hidden');
            document.getElementById('dashboard-container').classList.add('hidden');
            document.getElementById('login-container').classList.remove('hidden');
        }

        // --- MANAJEMEN DATA PRODUK (MULTI-VARIAN) ---
        async function reloadData() {
            const response = await fetch(SUPABASE_URL + '?select=*&order=id.asc', { headers: getHeaders() });
            const rawData = await response.json();
            
            // Mengelompokkan data flat dari Supabase ke bentuk objek per-Produk
            const productsMap = {};
            rawData.forEach(row => {
                if (!row.nama) return;
                if (!productsMap[row.nama]) {
                    productsMap[row.nama] = {
                        nama: row.nama,
                        kategori: row.kategori,
                        ikon: row.ikon,
                        variants: []
                    };
                }
                if(row.durasi) {
                    productsMap[row.nama].variants.push({
                        id: row.id,
                        durasi: row.durasi,
                        harga: row.harga,
                        status: row.status
                    });
                }
            });
            
            productsData = Object.values(productsMap);
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';
            if(productsData.length === 0) { tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center">Belum ada data</td></tr>'; return; }

            productsData.forEach((product, index) => {
                const tr = document.createElement('tr');
                tr.className = "border-b-2 border-gray-200 hover:bg-gray-50";
                
                const isImage = product.ikon && (product.ikon.startsWith('http') || product.ikon.startsWith('data:image'));
                const ikonDisplay = isImage 
                    ? `<img src="${product.ikon}" alt="ikon" class="w-6 h-6 md:w-8 md:h-8 object-contain mx-auto rounded">`
                    : `<span class="text-xl md:text-2xl">${product.ikon || '-'}</span>`;

                // Menyusun daftar varian dalam 1 kolom
                const variantsHtml = product.variants.map(v => 
                    `<div class="text-xs md:text-sm mb-1"><span class="font-bold border-b border-gray-300 pb-0.5 inline-block min-w-[60px]">${v.durasi}</span> <span class="text-blue-600 font-semibold mx-1">${v.harga}</span> ${v.status.toLowerCase() === 'ada' ? '🟢' : '🔴'}</div>`
                ).join('');

                tr.innerHTML = `
                    <td class="p-3 md:p-4 border-r-2 border-black font-extrabold whitespace-nowrap text-sm md:text-base">${product.nama}</td>
                    <td class="p-3 md:p-4 border-r-2 border-black text-xs md:text-sm whitespace-nowrap">${product.kategori}</td>
                    <td class="p-3 md:p-4 border-r-2 border-black text-center">${ikonDisplay}</td>
                    <td class="p-3 md:p-4 border-r-2 border-black">${variantsHtml || '-'}</td>
                    <td class="p-3 md:p-4 text-center space-x-1 md:space-x-2 whitespace-nowrap">
                        <button onclick="editRow(${index})" class="neo-btn bg-blue-300 px-2 md:px-3 py-1 rounded text-xs md:text-sm font-bold">Edit</button>
                        <button onclick="deleteProduct('${product.nama}')" class="neo-btn bg-red-400 px-2 md:px-3 py-1 rounded text-xs md:text-sm font-bold text-white">X</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Fungsi menambahkan baris varian secara dinamis di form
        function addVariantField(durasi = '', harga = '', status = 'Ada') {
            const container = document.getElementById('variants-container');
            const div = document.createElement('div');
            div.className = 'flex flex-col md:flex-row gap-2 variant-row neo-border p-2 rounded-xl bg-white';
            div.innerHTML = `
                <input type="text" class="v-durasi w-full md:w-2/5 text-xs md:text-sm neo-border rounded-lg py-1.5 px-2" placeholder="Durasi (mis: 1 Bulan)" value="${durasi}">
                <input type="text" class="v-harga w-full md:w-2/5 text-xs md:text-sm neo-border rounded-lg py-1.5 px-2" placeholder="Harga (mis: Rp 23.000)" value="${harga}">
                <div class="flex gap-2 w-full md:w-1/5 justify-between">
                    <select class="v-status w-full text-xs md:text-sm neo-border rounded-lg py-1.5 px-1">
                        <option value="Ada" ${status === 'Ada' ? 'selected' : ''}>Ada</option>
                        <option value="Kosong" ${status === 'Kosong' ? 'selected' : ''}>Kosong</option>
                    </select>
                    <button type="button" onclick="this.closest('.variant-row').remove()" class="text-red-500 font-bold px-2.5 bg-red-100 neo-border rounded-lg">X</button>
                </div>
            `;
            container.appendChild(div);
        }

        function openModal(index = null) {
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById('variants-container').innerHTML = ''; // Reset Varian
            
            const preview = document.getElementById('ikon-preview');
            const fileInput = document.getElementById('form-ikon-file');
            fileInput.value = ''; 

            if (index !== null) {
                const product = productsData[index];
                document.getElementById('modal-title').innerText = "Edit Produk";
                document.getElementById('form-old-nama').value = product.nama;
                document.getElementById('form-nama').value = product.nama;
                
                const dropdownKategori = document.getElementById('form-kategori');
                dropdownKategori.value = product.kategori;
                if(dropdownKategori.value === "") dropdownKategori.value = "Entertainment";

                document.getElementById('form-ikon-existing').value = product.ikon || '';

                // Memuat semua varian ke dalam modal
                if(product.variants.length > 0) {
                    product.variants.forEach(v => addVariantField(v.durasi, v.harga, v.status));
                } else {
                    addVariantField(); // Minimal 1 form kosong
                }

                if (product.ikon && (product.ikon.startsWith('http') || product.ikon.startsWith('data:image'))) {
                    preview.src = product.ikon;
                    preview.classList.remove('hidden');
                } else {
                    preview.src = '';
                    preview.classList.add('hidden');
                }
            } else {
                document.getElementById('modal-title').innerText = "Tambah Produk Baru";
                document.getElementById('form-old-nama').value = "";
                document.getElementById('form-nama').value = "";
                document.getElementById('form-kategori').value = "Entertainment"; 
                document.getElementById('form-ikon-existing').value = "";
                
                addVariantField(); // Tambah 1 form kosong default

                preview.src = '';
                preview.classList.add('hidden');
            }
        }

        function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }

        document.getElementById('form-ikon-file').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const preview = document.getElementById('ikon-preview');
                preview.src = URL.createObjectURL(file);
                preview.classList.remove('hidden');
            }
        });

        async function saveData() {
            const btn = document.getElementById('btn-simpan');
            const oldNama = document.getElementById('form-old-nama').value;
            const newNama = document.getElementById('form-nama').value;
            const newKategori = document.getElementById('form-kategori').value;
            let finalIkonValue = document.getElementById('form-ikon-existing').value;
            const fileInput = document.getElementById('form-ikon-file');

            if(!newNama) { alert("Nama produk tidak boleh kosong!"); return; }

            // Mengumpulkan data dari form varian dinamis
            const variantRows = document.querySelectorAll('.variant-row');
            const variants = [];
            variantRows.forEach(row => {
                const durasi = row.querySelector('.v-durasi').value.trim();
                const harga = row.querySelector('.v-harga').value.trim();
                const status = row.querySelector('.v-status').value;
                if (durasi) variants.push({ durasi, harga, status });
            });

            if (variants.length === 0) {
                alert("Minimal harus ada 1 varian (durasi) yang diisi!"); return;
            }

            btn.innerText = "Mengunggah & Menyimpan..."; 
            btn.disabled = true;

            try {
                // 1. UPLOAD GAMBAR JIKA ADA
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;

                    const uploadResponse = await fetch(`${SUPABASE_STORAGE_API}/${fileName}`, {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + sessionToken, 'apikey': SUPABASE_KEY, 'Content-Type': file.type },
                        body: file
                    });
                    if (!uploadResponse.ok) throw new Error('Gagal unggah gambar.');
                    finalIkonValue = `${SUPABASE_STORAGE_PUBLIC}/${fileName}`;
                }

                // 2. HAPUS DATA LAMA JIKA SEDANG EDIT
                // Karena database kita strukturnya "flat", kita hapus dulu semua varian lama berdasarkan Nama Produk.
                if (oldNama) {
                    await fetch(SUPABASE_URL + '?nama=eq.' + encodeURIComponent(oldNama), { 
                        method: 'DELETE', headers: getHeaders() 
                    });
                }

                // 3. SUSUN DATA BARU (BULK INSERT)
                const bulkPayload = variants.map(v => ({
                    nama: newNama,
                    kategori: newKategori,
                    ikon: finalIkonValue, 
                    warna: 'text-black', 
                    durasi: v.durasi,
                    harga: v.harga,
                    status: v.status
                }));

                // 4. SIMPAN KE DATABASE SEKALIGUS
                const insertRes = await fetch(SUPABASE_URL, { 
                    method: 'POST', 
                    headers: getHeaders(), 
                    body: JSON.stringify(bulkPayload) 
                });

                if(!insertRes.ok) throw new Error('Gagal menyimpan data.');

                closeModal();
                await reloadData();
            } catch (err) { 
                alert("Terjadi kesalahan: " + err.message); 
                console.error(err);
            }
            
            btn.innerText = "Simpan Seluruh Data"; btn.disabled = false;
        }

        function editRow(index) { openModal(index); }

        async function deleteProduct(nama) {
            if(confirm(`PERINGATAN!\nAnda yakin ingin menghapus seluruh paket varian dari produk "${nama}"?`)) {
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = '<tr><td colspan="5" class="p-4 text-center font-bold text-red-500">Menghapus Produk...</td></tr>';
                // Menghapus semua baris yang memiliki nama tersebut
                await fetch(SUPABASE_URL + '?nama=eq.' + encodeURIComponent(nama), { method: 'DELETE', headers: getHeaders() });
                await reloadData();
            }
        }
    </script>
</body>
</html>
